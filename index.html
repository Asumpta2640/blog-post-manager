<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLog Post Manager</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main>
        <h1>Blog Post Manager</h1>
        <section id="post-list-section">
            <h2>All Posts</h2>
            <div id="post-list"></div>
        </section>

        <section id="post-details-section">
            <h2>Post Details</h2>
            <div id="post-detail">Select a post to view its content.</div>         
        </section>

        <section>
            <h2>Add New Post</h2>
            <form id="new-post-form">
                <input type="text" id="new-title" placeholder="post Title" required/>
                <input type="text" id="new-author" placeholder="Author Name"required/>
                <input type="text" id="new-content" placeholder="post content"required>
                <button type="submit">Add post</button>
            </form>
        </section>
        <section>
            <form id="edit-post-form" class="hidden">
                <h2>Edit post</h2>
                <label for="edit-title">Title:</label>
                <input type="text" id="edit-title" required/>

                <label for="edit-content">Content</label>
                <div id="edit-content" contenteditable="true" class="editable-content" required></div>

                <button type="submit">Update Post</button>
                <button type="button" id="cancel-edit">Cancel</button>
            </form>
        </section>
    </main>

    <script src="src/index.js"></script>
</body>
</html>
